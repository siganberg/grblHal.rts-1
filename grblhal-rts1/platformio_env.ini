# ===================== RealTime CNC RTS-1 (Onefinity) =====================
# STM32F401RCT6, 5x DRV8452, USB-C CDC. Board map: boards/rts1_map.h
# 5 motors: X, Y, Z, A + ganged Y2 (auto-square). 4 logical axes.
[env:RTS1]
board                = genericSTM32F401RC
board_build.ldscript = STM32F401RC_FLASH.ld
build_flags          = ${common.build_flags}
  -D BOARD_RTS1=
  -D HSE_VALUE=8000000         # 8 MHz crystal (extracted from stock firmware HSI/HSE constant pair)
  -D USB_SERIAL_CDC=1
  -D N_AXIS=4                  # X Y Z A
  -D Y_AUTO_SQUARE=1           # dual-Y gantry squaring (adds ganged motor M4)
  # Stock RTS-1 motion defaults (from the RealTimeCNC config UI), applied on $RST=$.
  # Travel (mm) -> $130-132
  -D DEFAULT_X_MAX_TRAVEL=420
  -D DEFAULT_Y_MAX_TRAVEL=420
  -D DEFAULT_Z_MAX_TRAVEL=110
  # Steps/mm -> $100-102 (at 1/16 microstep, set on the DRV8452 in board_init)
  -D DEFAULT_X_STEPS_PER_MM=320
  -D DEFAULT_Y_STEPS_PER_MM=320
  -D DEFAULT_Z_STEPS_PER_MM=800
  # Max rate (mm/min) -> $110-112
  -D DEFAULT_X_MAX_RATE=5715
  -D DEFAULT_Y_MAX_RATE=5715
  -D DEFAULT_Z_MAX_RATE=3000
  # Acceleration (mm/sec^2) -> $120-122  (stock 750000 mm/min^2 = 208.33 mm/sec^2)
  -D DEFAULT_X_ACCELERATION=208
  -D DEFAULT_Y_ACCELERATION=208
  -D DEFAULT_Z_ACCELERATION=208
  # Direction inverts: Z reversed ($3 bit2=4); ganged Y2 dir invert ($8) = 0
  -D DEFAULT_DIR_SIGNALS_INVERT_MASK=4
  -D DEFAULT_GANGED_DIRECTION_INVERT_MASK=0
  # Homing + limits, baked so they survive a re-flash (NVS doesn't persist here yet).
  # $5: no physical limit switches - rts1.c force-reports limits clear via
  # hal.limits.get_state, so this invert mask is cosmetic/unused.
  -D DEFAULT_LIMIT_SIGNALS_INVERT_MASK=7
  # $22 = 79: homing enable(1)+single-axis(2)+init-lock(4)+force-origin(8)+override-locks(64)
  -D DEFAULT_HOMING_ENABLE=1
  -D DEFAULT_HOMING_SINGLE_AXIS_COMMANDS=1
  -D DEFAULT_HOMING_INIT_LOCK=1
  -D DEFAULT_HOMING_FORCE_SET_ORIGIN=1
  -D DEFAULT_HOMING_OVERRIDE_LOCKS=1
  # $20 = 1 soft limits, $40 = 1 limit jog commands to machine envelope
  -D DEFAULT_SOFT_LIMIT_ENABLE=1
  -D DEFAULT_JOG_LIMIT_ENABLE=1
  # Spindle: compile in ALL VFD types (Huanyang v1/v2, GS20, YL620A, MODVFD,
  # H100, NoWForever) + PWM. Pick the active one at runtime: $395 = spindle type,
  # $511.. bind spindle slots. VFDs use Modbus RTU on USART1 (DE on PA8).
  # All VFD types + a plain on/off spindle. NOT PWM: PA0's only timers are TIM5
  # (grblHAL stepper timer) and TIM2 (RPM timer), so a PA0 PWM spindle conflicts
  # with step generation and hangs boot. On/off (no timer) is the safe default.
  # VFD set trimmed so probing macros (NGC_EXPRESSIONS) fit. The USABLE code region is
  # only ~224 KB (the ldscript reserves 16 KB for flash-NVS); NGC filled it, so we keep
  # one VFD: H100 (bit6, target hardware) + on/off (bit7). Mask = (1<<6)|(1<<7) = 192.
  # Each VFD is only ~1.6 KB - once the I2C EEPROM frees the 16 KB sector (see HANDOFF.md)
  # this can go back to the full mask. To use a different single VFD now, swap bit6 for
  # its type (Huanyang v1=1, GS20=3...). Precomputed: inline ()/| in -D break the build.
  -D SPINDLE_ENABLE=192
  -D DEFAULT_SPINDLE=SPINDLE_ONOFF0   # quiet on/off default (no Modbus polling); pick a VFD via $395
  -D N_SPINDLE=2
  -D MODBUS_ENABLE=2           # RTU + RS-485 direction on aux output (PA8)
  # NGC expressions + parameters + O-word flow control: needed by probe/tool-change
  # macros (ncSender's probe blocks use #<vars>, [math], G[expr]). Without this the
  # macro lines throw Error 1. Pulls in ngc_expr.c/ngc_flowctrl.c/ngc_params.c.
  -D NGC_EXPRESSIONS_ENABLE=1
  # I2C EEPROM (24C32+ @ 0x50 on I2C1/PB6-7) for persistent NVS. Setting EEPROM_ENABLE
  # also forces FLASH_ENABLE=0, freeing the 16 KB flash-NVS sector (reclaim via ldscript).
  # grblHAL owns I2C1; the TCA9555 expander shares it via i2c_transfer().
  -D I2C_ENABLE=1
  -D I2C_PORT=1
  -D I2C1_ALT_PINMAP
  -D EEPROM_ENABLE=32
lib_deps             = ${common.lib_deps}
  eeprom
lib_extra_dirs       = ${common.lib_extra_dirs}
upload_protocol      = dfu
